spring:
  application:
    name: citizen-api

  datasource:
    url: jdbc:h2:file:./data/citizendb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  flyway:
    enabled: false

server:
  port: 8080

app:
  municipality-id: 1488

kir:
  base-url: http://localhost:9090
  api-key: test-api-key
  connect-timeout-ms: 3000
  read-timeout-ms: 5000
  person-lookup-path: /api/v1/citizens/{personNumber}
