spring:
  datasource:
    url: jdbc:h2:file:./data/citizendb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  flyway:
    enabled: false

server:
  port: 8080